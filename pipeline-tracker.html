<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline & Forecast Tracker — GeoVictoria MX</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --bg2: #181818;
    --bg3: #222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --text2: #888;
    --text3: #555;
    --green: #1fba82;
    --blue: #4a9eff;
    --amber: #f0a020;
    --red: #e05050;
    --accent: #f0ede8;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    padding: 2rem;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .logo {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  h1 {
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .month-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 2rem;
    border-bottom: 0.5px solid var(--border);
    padding-bottom: 0;
  }

  .tab {
    padding: 8px 20px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -0.5px;
    transition: color 0.15s, border-color 0.15s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 500; }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }

  .metric-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }

  .metric-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .metric-val {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .metric-sub {
    font-size: 12px;
    margin-top: 4px;
    font-weight: 500;
  }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 2rem;
  }

  .section-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    margin-bottom: 1.25rem;
  }

  .channel-row { margin-bottom: 16px; }

  .channel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .channel-name { font-size: 13px; color: var(--text2); }

  .pct-label {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
  }

  .bar-wrap {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    position: relative;
    margin-bottom: 4px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .channel-nums {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
  }

  .divider {
    border: none;
    border-top: 0.5px solid var(--border);
    margin: 1.5rem 0;
  }

  .metas-section { }

  .metas-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: 0.5px solid var(--border2);
    color: var(--text2);
    font-family: var(--sans);
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .metas-toggle:hover { color: var(--text); border-color: var(--border2); }

  .metas-panel {
    margin-top: 1.25rem;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .metas-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  .meta-col-label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    margin-bottom: 12px;
    grid-column: 1 / -1;
  }

  .meta-sub-col { display: flex; flex-direction: column; gap: 10px; }
  .meta-sub-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 8px;
  }

  .meta-input-row { display: flex; flex-direction: column; gap: 3px; }

  .meta-input-label {
    font-size: 11px;
    color: var(--text2);
  }

  .meta-input {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 10px;
    width: 100%;
    transition: border-color 0.15s;
  }

  .meta-input:focus {
    outline: none;
    border-color: var(--border2);
  }

  .meta-input::placeholder { color: var(--text3); }

  .save-hint {
    font-size: 11px;
    color: var(--text3);
    margin-top: 12px;
    font-family: var(--mono);
  }

  .total-row {
    border-top: 0.5px solid var(--border);
    padding-top: 10px;
    margin-top: 4px;
  }

  @media (max-width: 700px) {
    body { padding: 1rem; }
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .two-col { grid-template-columns: 1fr; }
    .metas-inner { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">GeoVictoria México</div>
    <h1>Pipeline & Forecast</h1>
  </div>
  <div class="logo" id="lastSaved">sin cambios guardados</div>
</header>

<div class="month-tabs" id="tabs"></div>
<div class="summary-grid" id="summary"></div>
<div class="two-col" id="charts"></div>
<hr class="divider">
<div class="metas-section">
  <button class="metas-toggle" onclick="toggleMetas()">
    <span id="toggleArrow">▶</span> Editar metas del mes
  </button>
  <div id="metasPanel" style="display:none;">
    <div class="metas-panel">
      <div class="metas-inner" id="metasInner"></div>
      <p class="save-hint">Los datos se guardan automáticamente en tu navegador.</p>
    </div>
  </div>
</div>

<script>
const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const M_LABELS = {enero:'Enero',febrero:'Febrero',marzo:'Marzo',abril:'Abril',mayo:'Mayo',junio:'Junio',julio:'Julio',agosto:'Agosto',septiembre:'Sep',octubre:'Oct',noviembre:'Nov',diciembre:'Dic'};
const CHANNELS = ['SDR','Prospeccion','Partners','Ads'];
const CH_LABELS = {SDR:'SDR',Prospeccion:'Prosp./Referidos',Partners:'Partners',Ads:'Ads'};

// Real data — actualizar cada mes
const REAL = {
  enero:   { pipe:{SDR:36335,Prospeccion:21400,Partners:5000,Ads:19600}, forecast:{SDR:2900,Prospeccion:1900,Partners:0,Ads:2000} },
  febrero: { pipe:{SDR:23400,Prospeccion:4800,Partners:8000,Ads:46000},  forecast:{SDR:600,Prospeccion:600,Partners:300,Ads:2700} },
  marzo:   { pipe:{SDR:24000,Prospeccion:64000,Partners:5400,Ads:7500},  forecast:{SDR:2072,Prospeccion:1400,Partners:2800,Ads:5000} }
};

function totalReal(month, section) {
  if (!REAL[month]) return 0;
  return CHANNELS.reduce((s, ch) => s + (REAL[month][section][ch] || 0), 0);
}

// Load metas from localStorage
function defaultMetas() {
  const obj = {};
  MONTHS.forEach(m => { obj[m] = { pipe:{}, forecast:{} }; CHANNELS.forEach(ch => { obj[m].pipe[ch]=null; obj[m].forecast[ch]=null; }); obj[m].pipe.total=null; obj[m].forecast.total=null; });
  return obj;
}

let metas = defaultMetas();
try {
  const saved = localStorage.getItem('gv-metas-v1');
  if (saved) metas = JSON.parse(saved);
} catch(e) {}

function saveMetas() {
  try {
    localStorage.setItem('gv-metas-v1', JSON.stringify(metas));
    const now = new Date();
    document.getElementById('lastSaved').textContent = 'guardado ' + now.toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit'});
  } catch(e) {}
}

let current = 'marzo';
let metasOpen = false;

function fmt(n) { return n != null && n !== '' ? '$' + Math.round(n).toLocaleString('es-MX') : '—'; }
function fmtPct(p) { return p != null ? Math.round(p) + '%' : '—'; }

function pctColor(p) {
  if (p == null) return '#555';
  if (p >= 100) return '#1fba82';
  if (p >= 75)  return '#4a9eff';
  if (p >= 50)  return '#f0a020';
  return '#e05050';
}

function getPct(r, m) {
  if (!m || m === 0 || r == null) return null;
  return (r / m) * 100;
}

function getEffectiveMeta(month, section) {
  const m = metas[month];
  if (!m) return null;
  if (m[section].total) return parseFloat(m[section].total);
  let sum = 0, any = false;
  CHANNELS.forEach(ch => { if (m[section][ch]) { sum += parseFloat(m[section][ch]); any = true; } });
  return any ? sum : null;
}

function renderSummary() {
  const secs = ['pipe','forecast'];
  const labels = {pipe:'Pipeline total',forecast:'Forecast total'};
  let html = '';
  secs.forEach(s => {
    const r = totalReal(current, s);
    const metaVal = getEffectiveMeta(current, s);
    const p = getPct(r, metaVal);
    const color = pctColor(p);
    html += `<div class="metric-card">
      <div class="metric-label">${labels[s]}</div>
      <div class="metric-val">${fmt(r)}</div>
      <div class="metric-sub" style="color:${color}">${p != null ? fmtPct(p) + ' cumplido' : 'ingresa meta'}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Meta ${s}</div>
      <div class="metric-val">${fmt(metaVal)}</div>
      <div class="metric-sub" style="color:${metaVal ? (r >= metaVal ? '#1fba82' : '#e05050') : '#555'}">${metaVal ? fmt(r - metaVal) : 'sin definir'}</div>
    </div>`;
  });
  document.getElementById('summary').innerHTML = html;
}

function renderSection(section) {
  return CHANNELS.map(ch => {
    const r = REAL[current] ? (REAL[current][section][ch] || 0) : 0;
    const m = metas[current] && metas[current][section][ch] ? parseFloat(metas[current][section][ch]) : null;
    const p = getPct(r, m);
    const color = pctColor(p);
    const barW = p != null ? Math.min(100, p) : 0;
    return `<div class="channel-row">
      <div class="channel-header">
        <span class="channel-name">${CH_LABELS[ch]}</span>
        <span class="pct-label" style="color:${color}">${p != null ? fmtPct(p) : '—'}</span>
      </div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${barW}%;background:${color};"></div></div>
      <div class="channel-nums">${fmt(r)}${m ? ' · meta ' + fmt(m) : ' · sin meta'}</div>
    </div>`;
  }).join('') + (() => {
    const r = totalReal(current, section);
    const m = getEffectiveMeta(current, section);
    const p = getPct(r, m);
    const color = pctColor(p);
    return `<div class="channel-row total-row">
      <div class="channel-header">
        <span class="channel-name" style="color:var(--text);font-weight:500;">Total</span>
        <span class="pct-label" style="color:${color};font-size:13px;">${p != null ? fmtPct(p) : '—'}</span>
      </div>
      <div class="bar-wrap" style="height:6px;"><div class="bar-fill" style="width:${p!=null?Math.min(100,p):0}%;background:${color};"></div></div>
      <div class="channel-nums">${fmt(r)}${m ? ' · meta ' + fmt(m) : ''}</div>
    </div>`;
  })();
}

function renderCharts() {
  document.getElementById('charts').innerHTML = `
    <div class="section-card">
      <div class="section-label">Pipeline por canal</div>
      ${renderSection('pipe')}
    </div>
    <div class="section-card">
      <div class="section-label">Forecast por canal</div>
      ${renderSection('forecast')}
    </div>`;
}

function renderMetasPanel() {
  if (!metas[current]) { metas[current] = { pipe:{}, forecast:{} }; }
  const m = metas[current];

  function inputRow(section, key, label) {
    const val = m[section][key] || '';
    return `<div class="meta-input-row">
      <label class="meta-input-label">${label}</label>
      <input class="meta-input" type="number" placeholder="0" value="${val}"
        data-section="${section}" data-key="${key}"
        oninput="handleMetaInput(this)">
    </div>`;
  }

  document.getElementById('metasInner').innerHTML = `
    <div>
      <div class="meta-sub-label">Pipeline</div>
      ${inputRow('pipe','total','Total mes (override)')}
      <div style="height:8px;"></div>
      ${CHANNELS.map(ch => inputRow('pipe', ch, CH_LABELS[ch])).join('')}
    </div>
    <div>
      <div class="meta-sub-label">Forecast</div>
      ${inputRow('forecast','total','Total mes (override)')}
      <div style="height:8px;"></div>
      ${CHANNELS.map(ch => inputRow('forecast', ch, CH_LABELS[ch])).join('')}
    </div>`;
}

function handleMetaInput(input) {
  const val = input.value !== '' ? parseFloat(input.value) : null;
  if (!metas[current]) metas[current] = { pipe:{}, forecast:{} };
  metas[current][input.dataset.section][input.dataset.key] = val;
  saveMetas();
  renderSummary();
  renderCharts();
}

function toggleMetas() {
  metasOpen = !metasOpen;
  document.getElementById('metasPanel').style.display = metasOpen ? 'block' : 'none';
  document.getElementById('toggleArrow').textContent = metasOpen ? '▼' : '▶';
  if (metasOpen) renderMetasPanel();
}

function setMonth(m) {
  current = m;
  renderTabs();
  renderSummary();
  renderCharts();
  if (metasOpen) renderMetasPanel();
}

function renderTabs() {
  const available = MONTHS.filter(m => REAL[m] || (metas[m] && (metas[m].pipe.total || metas[m].forecast.total)));
  const show = [...new Set([...Object.keys(REAL), current])];
  document.getElementById('tabs').innerHTML = show.map(m =>
    `<button class="tab ${m===current?'active':''}" onclick="setMonth('${m}')">${M_LABELS[m]}</button>`
  ).join('');
}

renderTabs();
renderSummary();
renderCharts();
</script>
</body>
</html>
